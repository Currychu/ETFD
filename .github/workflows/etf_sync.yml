name: 每週執行 ETF 配息抓取

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

# 加入這段環境變數設定，提前切換至 Node.js 24 來消除警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 取得儲存庫程式碼
      uses: actions/checkout@v4

    - name: 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安裝所需套件
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 執行 Python 程式
      run: python main.py

    - name: 將產出的 Excel 檔上傳至 Actions 供下載
      uses: actions/upload-artifact@v4
      with:
        name: ETF_Dividend_Data
        path: ETF_Full_Synced_Final_2026.xlsx
